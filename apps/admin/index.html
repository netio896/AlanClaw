<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlanClaw Admin</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="admin-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Catalog Admin</p>
          <h1>AlanClaw 专家管理台</h1>
        </div>
        <div class="topbar-actions">
          <span class="status-pill" id="catalogStatus">检查中</span>
          <a class="ghost-link" href="../web/index.html">查看 Web 原型</a>
        </div>
      </header>

      <section class="summary-grid" id="summaryGrid"></section>

      <main class="workspace">
        <aside class="panel list-panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Experts</p>
              <h2>专家列表</h2>
            </div>
            <span class="count-pill" id="listCount">0</span>
          </div>
          <label class="search-control">
            <span>⌕</span>
            <input id="searchInput" type="search" placeholder="搜索标题、分类或标签" />
          </label>
          <div class="chip-row" id="categoryFilters"></div>
          <div class="expert-list" id="expertList"></div>
        </aside>

        <section class="panel editor-panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Edit Preview</p>
              <h2 id="editorTitle">选择一个专家</h2>
            </div>
            <div class="editor-actions">
              <button type="button" class="secondary-button" id="reloadButton">重新加载</button>
              <button type="button" class="primary-button" id="saveButton">保存到本地</button>
            </div>
          </div>
          <p class="save-status neutral" id="saveStatus">正在连接本地服务</p>

          <div class="form-grid">
            <label>
              <span>标题</span>
              <input id="fieldTitle" type="text" />
            </label>
            <label>
              <span>分类</span>
              <input id="fieldCategory" type="text" />
            </label>
            <label>
              <span>Slug</span>
              <input id="fieldSlug" type="text" readonly />
            </label>
            <label>
              <span>排序</span>
              <input id="fieldSortOrder" type="number" />
            </label>
            <label class="wide">
              <span>卡片简介</span>
              <textarea id="fieldSummary" rows="3"></textarea>
            </label>
            <label class="wide">
              <span>关于我</span>
              <textarea id="fieldAbout" rows="5"></textarea>
            </label>
            <label class="wide">
              <span>系统提示词</span>
              <textarea id="fieldPrompt" rows="9"></textarea>
            </label>
            <label class="wide">
              <span>标签，逗号分隔</span>
              <input id="fieldTags" type="text" />
            </label>
            <label>
              <span>语言，逗号分隔</span>
              <input id="fieldLanguages" type="text" />
            </label>
            <label>
              <span>渠道，逗号分隔</span>
              <input id="fieldChannels" type="text" />
            </label>
            <label class="toggle-row">
              <span>精选</span>
              <input id="fieldFeatured" type="checkbox" />
            </label>
          </div>

          <div class="preview-card">
            <div>
              <span class="featured-badge" id="previewFeatured">精选</span>
              <h3 id="previewTitle">未选择专家</h3>
              <p id="previewSummary">从左侧选择一位专家后，这里会显示专家广场卡片预览。</p>
            </div>
            <button type="button" class="primary-button">添加</button>
          </div>
        </section>

        <aside class="panel validation-panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Validation</p>
              <h2>导入校验</h2>
            </div>
          </div>

          <section class="import-box">
            <h3>导入 / 导出</h3>
            <p>导入会先进入预览，不会立刻写盘。确认 diff 后点击保存，才会写回本地专家目录并重新生成派生文件。</p>
            <input id="importFileInput" type="file" accept=".json,.csv,application/json,text/csv" hidden />
            <div class="import-buttons">
              <button type="button" id="importButton">导入文件</button>
              <button type="button" id="exportJsonButton">导出 JSON</button>
              <button type="button" id="exportCsvButton">导出 CSV</button>
            </div>
            <p class="import-status" id="importStatus">等待导入或编辑。</p>
          </section>

          <section class="diff-box">
            <h3>保存前 Diff</h3>
            <p class="diff-summary" id="diffSummary">暂无变更。</p>
            <div class="diff-list" id="diffList"></div>
          </section>

          <section class="check-list" id="validationList"></section>

          <section class="metadata-box">
            <h3>当前记录</h3>
            <dl id="recordMeta"></dl>
          </section>

          <section class="metadata-box">
            <h3>行业团队模板</h3>
            <div class="team-template-list" id="teamTemplateList"></div>
          </section>
        </aside>
      </main>
    </div>

    <script src="./expert-data.js"></script>
    <script src="./team-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
